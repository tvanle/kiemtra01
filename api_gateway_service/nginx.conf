worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    upstream customer_service {
        server customer_service:8000;
    }

    upstream staff_service {
        server staff_service:8000;
    }

    upstream laptop_service {
        server laptop_service:8000;
    }

    upstream clothes_service {
        server clothes_service:8000;
    }

    upstream cart_service {
        server cart_service:8000;
    }

    server {
        listen 80;

        # Customer API + Template routes
        location /api/customer/ {
            proxy_pass http://customer_service/api/customer/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Cart routes
        location /api/customer/carts {
            proxy_pass http://cart_service/api/carts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/customer/cart-items {
            proxy_pass http://cart_service/api/cart-items;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Staff routes
        location /api/staff/ {
            proxy_pass http://staff_service/api/staff/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Laptop routes
        location /api/laptop/ {
            proxy_pass http://laptop_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Clothes routes
        location /api/clothes/ {
            proxy_pass http://clothes_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Also support /api/mobile/ for backward compatibility
        location /api/mobile/ {
            proxy_pass http://clothes_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Cart direct routes
        location /api/cart/ {
            proxy_pass http://cart_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

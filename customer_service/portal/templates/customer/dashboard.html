<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; min-height: 100vh; }
        .header { background: #16213e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #e94560; font-size: 24px; }
        .header-right { display: flex; gap: 20px; align-items: center; }
        .header a { color: #fff; text-decoration: none; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: #e94560; color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .container { display: flex; padding: 30px; gap: 30px; }
        .products { flex: 1; }
        .cart-sidebar { width: 350px; background: #16213e; border-radius: 10px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #0f3460; color: #fff; }
        .search-bar button { padding: 10px 20px; background: #e94560; border: none; border-radius: 5px; color: #fff; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #0f3460; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        .tab.active { background: #e94560; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: #16213e; border-radius: 10px; padding: 15px; }
        .product-card h3 { color: #fff; margin-bottom: 10px; font-size: 16px; }
        .product-card p { color: #aaa; font-size: 13px; margin-bottom: 5px; }
        .product-card .price { color: #e94560; font-size: 18px; font-weight: bold; margin: 10px 0; }
        .product-card button { width: 100%; padding: 10px; background: #4CAF50; border: none; border-radius: 5px; color: #fff; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #0f3460; }
        .cart-item-info { flex: 1; }
        .cart-item-name { color: #fff; font-size: 14px; }
        .cart-item-price { color: #e94560; font-size: 13px; }
        .cart-item-qty { display: flex; align-items: center; gap: 10px; }
        .cart-item-qty button { width: 25px; height: 25px; padding: 0; background: #0f3460; border: none; border-radius: 3px; color: #fff; cursor: pointer; }
        .cart-total { padding: 15px 0; border-top: 2px solid #e94560; margin-top: 10px; display: flex; justify-content: space-between; color: #fff; font-size: 18px; font-weight: bold; }
        .cart-actions { margin-top: 15px; }
        .cart-actions button { width: 100%; padding: 12px; background: #4CAF50; border: none; border-radius: 5px; color: #fff; cursor: pointer; font-size: 16px; }
        .empty-cart { text-align: center; color: #aaa; padding: 30px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Shop</h1>
        <div class="header-right">
            <span style="color:#fff;">Welcome, {{ user.username }}</span>
            <a href="/api/customer/logout/">Logout</a>
        </div>
    </div>
    <div class="container">
        <div class="products">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button onclick="searchProducts()">Search</button>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="showTab('laptops')">Laptops</button>
                <button class="tab" onclick="showTab('clothes')">Clothes</button>
            </div>
            <div class="product-grid" id="productGrid"></div>
        </div>
        <div class="cart-sidebar">
            <h2 style="color:#e94560;margin-bottom:20px;">Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total"><span>Total:</span><span id="cartTotal">0đ</span></div>
            <div class="cart-actions"><button onclick="checkout()">Checkout</button></div>
        </div>
    </div>

    <script>
        let cart = [];
        let currentUserId = {{ user.id }};

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadProducts(tab);
        }

        function loadProducts(tab) {
            const search = document.getElementById('searchInput').value;
            const endpoint = tab === 'laptops' ? '/api/laptop/laptops/' : '/api/clothes/clothes/';
            fetch(endpoint + (search ? `?search=${search}` : ''))
                .then(r => r.json())
                .then(data => {
                    const grid = document.getElementById('productGrid');
                    grid.innerHTML = (Array.isArray(data) ? data : []).map(p => `
                        <div class="product-card">
                            <h3>${p.name}</h3>
                            <p>Brand: ${p.brand}</p>
                            ${tab === 'laptops' ? `<p>CPU: ${p.cpu || '-'}</p><p>RAM: ${p.ram || '-'}</p>` : `<p>Size: ${p.size || '-'}</p><p>Color: ${p.color || '-'}</p>`}
                            <p class="price">${Number(p.price).toLocaleString()}đ</p>
                            <button onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${tab === 'laptops' ? 'laptop' : 'clothes}')">Add to Cart</button>
                        </div>
                    `).join('');
                });
        }

        function searchProducts() {
            const tab = document.querySelector('.tab.active').textContent === 'Laptops' ? 'laptops' : 'clothes';
            loadProducts(tab);
        }

        function addToCart(productId, name, price, type) {
            const existing = cart.find(i => i.productId === productId && i.type === type);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ productId, name, price, type, qty: 1 });
            }
            renderCart();
        }

        function updateQty(productId, type, delta) {
            const item = cart.find(i => i.productId === productId && i.type === type);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => !(i.productId === productId && i.type === type));
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
            } else {
                container.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${i.name}</div>
                            <div class="cart-item-price">${Number(i.price).toLocaleString()}đ x ${i.qty}</div>
                        </div>
                        <div class="cart-item-qty">
                            <button onclick="updateQty(${i.productId}, '${i.type}', -1)">-</button>
                            <span style="color:#fff;">${i.qty}</span>
                            <button onclick="updateQty(${i.productId}, '${i.type}', 1)">+</button>
                        </div>
                    </div>
                `).join('');
            }
            const total = cart.reduce((sum, i) => sum + Number(i.price) * i.qty, 0);
            document.getElementById('cartTotal').textContent = total.toLocaleString() + 'đ';
        }

        function checkout() {
            if (cart.length === 0) return alert('Cart is empty!');
            fetch('/api/cart/carts/by_user/?user_id=' + currentUserId)
                .then(r => r.json())
                .then(data => {
                    const cartId = data.id;
                    const promises = cart.map(item =>
                        fetch('/api/cart/cart-items/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                cart: cartId,
                                product_id: item.productId,
                                product_type: item.type,
                                quantity: item.qty,
                                price: item.price,
                                product_name: item.name
                            })
                        })
                    );
                    Promise.all(promises).then(() => {
                        cart = [];
                        renderCart();
                        alert('Order placed successfully!');
                    });
                });
        }

        loadProducts('laptops');
        renderCart();
    </script>
</body>
</html>

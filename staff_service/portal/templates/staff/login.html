<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: #16213e; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 400px; }
        h1 { color: #e94560; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #fff; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #0f3460; color: #fff; }
        button { width: 100%; padding: 12px; background: #e94560; border: none; border-radius: 5px; color: #fff; font-size: 16px; cursor: pointer; }
        button:hover { background: #ff6b6b; }
        .error { color: #ff6b6b; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Staff Portal</h1>
        <form method="post" action="/api/staff/login/">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Login</button>
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
        </form>
    </div>
</body>
</html>

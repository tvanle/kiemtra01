version: '3.8'

services:
  db_customer:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: customer_db
    ports:
      - "3331:3306"

  db_staff:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: staff_db
    ports:
      - "3333:3306"

  db_laptop:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: laptop_db
    ports:
      - "5431:5432"

  db_mobile:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mobile_db
    ports:
      - "5435:5432"

  api_gateway:
    build:
      context: ./api_gateway_service
    ports:
      - "8031:80"
    depends_on:
      - customer_service
      - staff_service
      - laptop_service
      - mobile_service

  customer_service:
    build:
      context: ./customer_service
    ports:
      - "8033:8000"
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db_customer:3306/customer_db
    depends_on:
      - db_customer

  staff_service:
    build:
      context: ./staff_service
    ports:
      - "8035:8000"
    environment:
      - DATABASE_URL=mysql://root:rootpassword@db_staff:3306/staff_db
    depends_on:
      - db_staff

  laptop_service:
    build:
      context: ./laptop_service
    ports:
      - "8037:8000"
    environment:
      - DATABASE_URL=postgres://user:password@db_laptop:5432/laptop_db
    depends_on:
      - db_laptop

  mobile_service:
    build:
      context: ./mobile_service
    ports:
      - "8039:8000"
    environment:
      - DATABASE_URL=postgres://user:password@db_mobile:5432/mobile_db
    depends_on:
      - db_mobile
